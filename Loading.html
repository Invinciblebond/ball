<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Shorten.it — Loading</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "surface-container-low": "#f2f4f6",
          "error": "#ba1a1a",
          "inverse-on-surface": "#eff1f3",
          "on-primary-fixed": "#001355",
          "error-container": "#ffdad6",
          "primary-fixed-dim": "#b8c3ff",
          "surface-container-lowest": "#ffffff",
          "secondary-container": "#dae2fd",
          "surface-variant": "#e0e3e5",
          "surface-bright": "#f7f9fb",
          "surface-dim": "#d8dadc",
          "secondary-fixed-dim": "#bec6e0",
          "outline-variant": "#c4c5d9",
          "on-surface-variant": "#434656",
          "surface-container-highest": "#e0e3e5",
          "tertiary-container": "#c24100",
          "on-secondary": "#ffffff",
          "tertiary-fixed-dim": "#ffb59b",
          "on-secondary-container": "#5c647a",
          "on-error": "#ffffff",
          "surface-container": "#eceef0",
          "on-primary-container": "#efefff",
          "outline": "#747688",
          "on-primary-fixed-variant": "#0035bd",
          "tertiary-fixed": "#ffdbcf",
          "on-tertiary-fixed-variant": "#812900",
          "on-secondary-fixed-variant": "#3f465c",
          "on-tertiary-fixed": "#380d00",
          "on-error-container": "#93000a",
          "tertiary": "#993100",
          "inverse-primary": "#b8c3ff",
          "on-tertiary-container": "#ffece6",
          "on-primary": "#ffffff",
          "surface-tint": "#104af0",
          "surface-container-high": "#e6e8ea",
          "on-secondary-fixed": "#131b2e",
          "on-background": "#191c1e",
          "surface": "#f7f9fb",
          "inverse-surface": "#2d3133",
          "primary-container": "#2d5bff",
          "secondary": "#565e74",
          "secondary-fixed": "#dae2fd",
          "primary": "#0040df",
          "on-tertiary": "#ffffff",
          "background": "#f7f9fb",
          "primary-fixed": "#dde1ff",
          "on-surface": "#191c1e"
        },
        borderRadius: {
          DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"
        },
        spacing: {
          "container-max": "1200px", unit: "8px", "margin-mobile": "20px",
          "section-padding": "80px", gutter: "24px"
        },
        fontFamily: { h1: ["Inter"], h2: ["Inter"], h3: ["Inter"], "body-lg": ["Inter"], "body-md": ["Inter"], "label-sm": ["Inter"] },
        fontSize: {
          h1: ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }],
          h3: ["24px", { lineHeight: "1.3", letterSpacing: "-0.01em", fontWeight: "600" }],
          "label-sm": ["14px", { lineHeight: "1.0", letterSpacing: "0.02em", fontWeight: "600" }],
          "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
        }
      }
    }
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }

  /* Breathing brand animation */
  @keyframes brand-breathe {
    0%, 100% { opacity: 1; transform: scale(1) translateY(0); }
    50% { opacity: 0.88; transform: scale(0.97) translateY(-3px); }
  }
  .animate-brand { animation: brand-breathe 3.2s ease-in-out infinite; }

  /* Icon subtle float */
  @keyframes icon-float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    33% { transform: translateY(-5px) rotate(-3deg); }
    66% { transform: translateY(-3px) rotate(2deg); }
  }
  .animate-icon { animation: icon-float 4s ease-in-out infinite; }

  /* Loading bar — staged fill with easing */
  @keyframes bar-stage1 {
    0% { width: 0%; }
    100% { width: 35%; }
  }
  @keyframes bar-stage2 {
    0% { width: 35%; }
    100% { width: 68%; }
  }
  @keyframes bar-stage3 {
    0% { width: 68%; }
    100% { width: 92%; }
  }
  @keyframes bar-final {
    0% { width: 92%; }
    100% { width: 100%; }
  }

  .loading-bar {
    height: 100%;
    border-radius: 9999px;
    background: linear-gradient(90deg, #0040df 0%, #2d5bff 60%, #6b8eff 100%);
    width: 0%;
    position: relative;
    overflow: hidden;
  }
  .loading-bar.stage1 { animation: bar-stage1 0.8s cubic-bezier(0.4,0,0.2,1) forwards; }
  .loading-bar.stage2 { animation: bar-stage2 1.0s cubic-bezier(0.4,0,0.2,1) forwards; }
  .loading-bar.stage3 { animation: bar-stage3 0.9s cubic-bezier(0.4,0,0.2,1) forwards; }
  .loading-bar.stage-final { animation: bar-final 0.5s cubic-bezier(0.4,0,1,1) forwards; }

  /* Shimmer on bar */
  .loading-bar::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
    animation: shimmer 1.4s ease-in-out infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(250%); }
  }

  /* Dot pulse */
  @keyframes dot-pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.2); }
  }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: #0040df; display: inline-block; }
  .dot:nth-child(1) { animation: dot-pulse 1.4s ease-in-out infinite 0s; }
  .dot:nth-child(2) { animation: dot-pulse 1.4s ease-in-out infinite 0.2s; }
  .dot:nth-child(3) { animation: dot-pulse 1.4s ease-in-out infinite 0.4s; }

  /* Status text fade */
  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .status-text { animation: fade-in-up 0.4s ease forwards; }

  /* Spin for spinner icon */
  @keyframes spin { to { transform: rotate(360deg); } }
  .animate-spin { animation: spin 1s linear infinite; }

  /* Page exit transition */
  @keyframes page-exit {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.03); }
  }
  body.exiting { animation: page-exit 0.5s ease forwards; pointer-events: none; }

  /* Blobs */
  .blob1 {
    position: fixed; top: -12%; right: -8%; width: 42vw; height: 42vw;
    background: radial-gradient(circle, #dde1ff 0%, transparent 70%);
    border-radius: 50%; pointer-events: none; z-index: -1;
    animation: blob-drift1 8s ease-in-out infinite;
  }
  .blob2 {
    position: fixed; bottom: -12%; left: -8%; width: 38vw; height: 38vw;
    background: radial-gradient(circle, #dae2fd 0%, transparent 70%);
    border-radius: 50%; pointer-events: none; z-index: -1;
    animation: blob-drift2 10s ease-in-out infinite;
  }
  @keyframes blob-drift1 {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(-2%, 3%) scale(1.04); }
  }
  @keyframes blob-drift2 {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(3%, -2%) scale(1.06); }
  }

  /* Grid lines (decorative) */
  .grid-lines {
    position: fixed; inset: 0; pointer-events: none; z-index: -1;
    background-image:
      linear-gradient(rgba(0,64,223,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,64,223,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
</style>
</head>
<body class="bg-background text-on-background overflow-hidden min-h-screen">

<!-- Atmospheric background -->
<div class="blob1"></div>
<div class="blob2"></div>
<div class="grid-lines"></div>

<main class="min-h-screen flex flex-col items-center justify-center px-8">

  <!-- Branding -->
  <div class="flex flex-col items-center mb-16 animate-brand">
    <div class="mb-6 relative">
      <!-- Outer glow ring -->
      <div class="absolute inset-0 rounded-xl bg-primary opacity-10 blur-xl scale-125"></div>
      <div class="relative flex items-center justify-center w-20 h-20 bg-primary-container rounded-xl shadow-[0px_12px_40px_rgba(45,91,255,0.2)] animate-icon">
        <span class="material-symbols-outlined text-on-primary-container" style="font-size:40px; font-variation-settings:'FILL' 0;">link</span>
      </div>
    </div>
    <h1 class="text-h1 font-bold text-primary tracking-tight" style="font-size:42px;">Shorten.it</h1>
    <p class="text-body-md text-on-surface-variant mt-2 opacity-60">Preparing your link workspace</p>
  </div>

  <!-- Progress area -->
  <div class="w-full max-w-xs flex flex-col items-center gap-5">

    <!-- Bar track -->
    <div class="w-full h-1.5 bg-surface-container-high rounded-full overflow-hidden">
      <div class="loading-bar" id="loadingBar"></div>
    </div>

    <!-- Percentage counter -->
    <div class="flex items-center justify-between w-full">
      <div class="flex items-center gap-2 text-on-secondary-container">
        <span class="material-symbols-outlined animate-spin" style="font-size:16px;">progress_activity</span>
        <span class="text-label-sm uppercase tracking-widest" id="statusText">Initializing API</span>
      </div>
      <span class="text-label-sm font-bold text-primary" id="percentText">0%</span>
    </div>

    <!-- Dot pulse -->
    <div class="flex gap-1.5 mt-2">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

</main>

<!-- Footer -->
<footer class="fixed bottom-8 w-full text-center px-8">
  <div class="flex flex-col items-center gap-3">
    <div class="flex gap-1">
      <div class="w-1 h-1 rounded-full bg-primary opacity-20"></div>
      <div class="w-1 h-1 rounded-full bg-primary opacity-40"></div>
      <div class="w-1 h-1 rounded-full bg-primary opacity-60"></div>
      <div class="w-1 h-1 rounded-full bg-primary opacity-40"></div>
      <div class="w-1 h-1 rounded-full bg-primary opacity-20"></div>
    </div>
    <p class="text-label-sm text-outline opacity-50">© 2024 Shorten.it. All rights reserved.</p>
  </div>
</footer>

<script>
  const bar = document.getElementById('loadingBar');
  const statusText = document.getElementById('statusText');
  const percentText = document.getElementById('percentText');

  const stages = [
    { cls: 'stage1', pct: 35, label: 'Initializing API', delay: 200 },
    { cls: 'stage2', pct: 68, label: 'Fetching resources', delay: 1100 },
    { cls: 'stage3', pct: 92, label: 'Almost ready', delay: 2300 },
    { cls: 'stage-final', pct: 100, label: 'Complete!', delay: 3400 },
  ];

  // Animate percentage counter
  function animatePct(from, to, duration) {
    const start = performance.now();
    function tick(now) {
      const t = Math.min((now - start) / duration, 1);
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // ease-in-out
      const val = Math.round(from + (to - from) * ease);
      percentText.textContent = val + '%';
      if (t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  let prevPct = 0;
  stages.forEach((s, i) => {
    setTimeout(() => {
      // Swap bar class
      bar.className = 'loading-bar ' + s.cls;

      // Update status text with fade
      statusText.style.animation = 'none';
      void statusText.offsetWidth; // reflow
      statusText.style.animation = '';
      statusText.className = 'text-label-sm uppercase tracking-widest status-text';
      statusText.textContent = s.label;

      // Animate counter
      const dur = [800, 1000, 900, 500][i];
      animatePct(prevPct, s.pct, dur);
      prevPct = s.pct;

      // Last stage: redirect
      if (i === stages.length - 1) {
        setTimeout(() => {
          document.body.classList.add('exiting');
          setTimeout(() => {
            window.location.href = 'lightlanding.html';
          }, 520);
        }, 600);
      }
    }, s.delay);
  });
</script>
</body>
</html>
